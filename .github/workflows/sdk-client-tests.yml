name: SDK Client Tests

on:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/sdk-client/**'
  pull_request:
    paths:
      - 'packages/sdk-client/**'

concurrency:
  group: sdk-client-tests-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test-sdk-client:
    name: Test SDK Client
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      caido:
        image: caido/caido:latest
        ports:
          - 8080:8080
        env:
          CAIDO_REGISTRATION_KEY: ${{ secrets.CAIDO_REGISTRATION_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Mise
        uses: caido/action-mise-action@v3.2.0
        with:
          version: ${{ vars.CI__MISE_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run sdk-client tests
        run: pnpm --filter @caido/sdk-client test
        env:
          CAIDO_PAT: ${{ secrets.CAIDO_PAT }}
          CAIDO_INSTANCE_URL: http://localhost:8080
