fragment ReplayEntryHttpFull on ReplayEntryHttp {
  __typename
  connection {
    ...ConnectionInfoFull
  }
  createdAt
  error
  id
  raw @include(if: $includeReplayRaw)
  request {
    ...RequestFull
  }
  session {
    id
  }
  settings {
    placeholders {
      ...ReplayPlaceholderFull
    }
  }
}

fragment ReplayEntryWsFull on ReplayEntryWs {
  __typename
  createdAt
  error
  id
  http {
    ...ReplayEntryHttpFull
  }
  session {
    id
  }
}

fragment ReplayEntryFull on ReplayEntry {
  ... on ReplayEntryHttp {
    ...ReplayEntryHttpFull
  }
  ... on ReplayEntryWs {
    ...ReplayEntryWsFull
  }
}

fragment ReplayPlaceholderFull on ReplayPlaceholder {
  __typename
  inputRange {
    ...RangeFull
  }

  outputRange {
    ...RangeFull
  }

  preprocessors {
    ...ReplayPreprocessorFull
  }
}

fragment ReplayPrefixPreprocessorFull on ReplayPrefixPreprocessor {
  __typename
  value
}

fragment ReplaySuffixPreprocessorFull on ReplaySuffixPreprocessor {
  __typename
  value
}

fragment ReplayUrlEncodePreprocessorFull on ReplayUrlEncodePreprocessor {
  __typename
  charset
  nonAscii
}

fragment ReplayWorkflowPreprocessorFull on ReplayWorkflowPreprocessor {
  __typename
  id
}

fragment ReplayEnvironmentPreprocessorFull on ReplayEnvironmentPreprocessor {
  __typename
  variableName
}

fragment ReplayPreprocessorFull on ReplayPreprocessor {
  __typename
  options {
    ... on ReplayPrefixPreprocessor {
      ...ReplayPrefixPreprocessorFull
    }

    ... on ReplaySuffixPreprocessor {
      ...ReplaySuffixPreprocessorFull
    }

    ... on ReplayUrlEncodePreprocessor {
      ...ReplayUrlEncodePreprocessorFull
    }

    ... on ReplayWorkflowPreprocessor {
      ...ReplayWorkflowPreprocessorFull
    }

    ... on ReplayEnvironmentPreprocessor {
      ...ReplayEnvironmentPreprocessorFull
    }
  }
}

fragment ReplaySessionHttpMeta on ReplaySessionHttp {
  __typename
  id
  name
  collection {
    id
  }
  activeEntry {
    id
  }
  entries(last: 1) {
    edges {
      node {
        id
      }
    }
  }
  settings {
    connectionClose
    updateContentLength
  }
}

fragment ReplaySessionWsMeta on ReplaySessionWs {
  __typename
  id
  name
  collection {
    id
  }
  activeEntry {
    id
  }
  entries(last: 1) {
    edges {
      node {
        id
      }
    }
  }
}

fragment ReplaySessionMeta on ReplaySession {
  ... on ReplaySessionHttp {
    ...ReplaySessionHttpMeta
  }
  ... on ReplaySessionWs {
    ...ReplaySessionWsMeta
  }
}

fragment ReplaySessionCollectionMeta on ReplaySessionCollection {
  id
  name
}

query ReplayEntry(
  $id: ID!
  $sessionKind: ReplaySessionKind!
  $includeReplayRaw: Boolean!
  $includeRequestRaw: Boolean!
  $includeResponseRaw: Boolean!
) {
  replayEntry(id: $id, sessionKind: $sessionKind) {
    ...ReplayEntryFull
  }
}

query ReplaySessions($first: Int, $after: String, $last: Int, $before: String) {
  replaySessions(first: $first, after: $after, last: $last, before: $before) {
    edges {
      cursor
      node {
        ...ReplaySessionMeta
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

query ReplaySessionEntries(
  $id: ID!
  $after: String
  $before: String
  $first: Int
  $last: Int
  $includeReplayRaw: Boolean!
  $includeRequestRaw: Boolean!
  $includeResponseRaw: Boolean!
) {
  replaySession(id: $id) {
    ... on ReplaySessionHttp {
      entries(after: $after, before: $before, first: $first, last: $last) {
        edges {
          cursor
          node {
            ...ReplayEntryFull
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
    ... on ReplaySessionWs {
      entries(after: $after, before: $before, first: $first, last: $last) {
        edges {
          cursor
          node {
            ...ReplayEntryFull
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
  }
}

query ReplaySession($id: ID!) {
  replaySession(id: $id) {
    ...ReplaySessionMeta
  }
}

query ReplaySessionCollections(
  $first: Int
  $after: String
  $last: Int
  $before: String
) {
  replaySessionCollections(
    first: $first
    after: $after
    last: $last
    before: $before
  ) {
    edges {
      cursor
      node {
        ...ReplaySessionCollectionMeta
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

mutation CreateReplaySession($input: CreateReplaySessionInput!) {
  createReplaySession(input: $input) {
    error {
      __typename
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on CloudUserError {
        ...CloudUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    session {
      ...ReplaySessionMeta
    }
  }
}

mutation CreateReplaySessionCollection(
  $input: CreateReplaySessionCollectionInput!
) {
  createReplaySessionCollection(input: $input) {
    collection {
      ...ReplaySessionCollectionMeta
    }
  }
}

mutation DeleteReplaySessions($ids: [ID!]!) {
  deleteReplaySessions(ids: $ids) {
    deletedIds
  }
}

mutation DeleteReplaySessionCollection($id: ID!) {
  deleteReplaySessionCollection(id: $id) {
    deletedId
  }
}

mutation MoveReplaySession($id: ID!, $collectionId: ID!) {
  moveReplaySession(id: $id, collectionId: $collectionId) {
    session {
      ...ReplaySessionMeta
    }
  }
}

mutation RenameReplaySession($id: ID!, $name: String!) {
  renameReplaySession(id: $id, name: $name) {
    session {
      ...ReplaySessionMeta
    }
  }
}

mutation RenameReplaySessionCollection($id: ID!, $name: String!) {
  renameReplaySessionCollection(id: $id, name: $name) {
    collection {
      ...ReplaySessionCollectionMeta
    }
  }
}

mutation SetActiveReplaySessionEntry($id: ID!, $entryId: ID!) {
  setActiveReplaySessionEntry(id: $id, entryId: $entryId) {
    session {
      ...ReplaySessionMeta
    }
  }
}

mutation UpdateReplayEntryDraft(
  $id: ID!
  $input: UpdateReplayEntryDraftInput!
) {
  updateReplayEntryDraft(id: $id, input: $input) {
    entry {
      id
    }
  }
}

mutation UpdateReplaySessionSettings(
  $id: ID!
  $input: ReplaySessionSettingsInput!
) {
  updateReplaySessionSettings(id: $id, input: $input) {
    session {
      id
    }
  }
}

mutation StartReplayTask($sessionId: ID!) {
  startReplayTask(sessionId: $sessionId) {
    error {
      __typename
      ... on CloudUserError {
        ...CloudUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on TaskInProgressUserError {
        ...TaskInProgressUserErrorFull
      }
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    task {
      ...ReplayTaskMeta
    }
  }
}
