fragment FindingFull on Finding {
  id
  request {
    id
  }
  title
  reporter
  description
  dedupeKey
  host
  path
  hidden
  createdAt
}

query Finding($id: ID!) {
  finding(id: $id) {
    ...FindingFull
  }
}

query Findings(
  $first: Int
  $after: String
  $last: Int
  $before: String
  $filter: FilterClauseFindingInput
  $order: FindingOrderInput
) {
  findings(
    first: $first
    after: $after
    last: $last
    before: $before
    filter: $filter
    order: $order
  ) {
    edges {
      cursor
      node {
        ...FindingFull
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

mutation CreateFinding($requestId: ID!, $input: CreateFindingInput!) {
  createFinding(requestId: $requestId, input: $input) {
    error {
      __typename
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
    }
    finding {
      ...FindingFull
    }
  }
}

mutation UpdateFinding($id: ID!, $input: UpdateFindingInput!) {
  updateFinding(id: $id, input: $input) {
    error {
      __typename
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    finding {
      ...FindingFull
    }
  }
}

mutation DeleteFindings($input: DeleteFindingsInput) {
  deleteFindings(input: $input) {
    deletedIds
  }
}
