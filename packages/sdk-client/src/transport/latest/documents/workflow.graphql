fragment WorkflowFull on Workflow {
  id
  name
  kind
  definition
  enabled
  global
  readOnly
  createdAt
  updatedAt
}

query Workflows {
  workflows {
    ...WorkflowFull
  }
}

query Workflow($id: ID!) {
  workflow(id: $id) {
    ...WorkflowFull
  }
}

mutation CreateWorkflow($input: CreateWorkflowInput!) {
  createWorkflow(input: $input) {
    error {
      __typename
      ... on WorkflowUserError {
        ...WorkflowUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
    }
    workflow {
      ...WorkflowFull
    }
  }
}

mutation UpdateWorkflow($id: ID!, $input: UpdateWorkflowInput!) {
  updateWorkflow(id: $id, input: $input) {
    error {
      __typename
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
      ... on WorkflowUserError {
        ...WorkflowUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
      ... on ReadOnlyUserError {
        ...ReadOnlyUserErrorFull
      }
    }
    workflow {
      ...WorkflowFull
    }
  }
}

mutation DeleteWorkflow($id: ID!) {
  deleteWorkflow(id: $id) {
    deletedId
    error {
      __typename
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
      ... on ReadOnlyUserError {
        ...ReadOnlyUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
  }
}

mutation TestWorkflowConvert($input: TestWorkflowConvertInput!) {
  testWorkflowConvert(input: $input) {
    error {
      __typename
      ... on WorkflowUserError {
        ...WorkflowUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    output
    runState
  }
}

mutation TestWorkflowPassive($input: TestWorkflowPassiveInput!) {
  testWorkflowPassive(input: $input) {
    error {
      __typename
      ... on WorkflowUserError {
        ...WorkflowUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    runState
  }
}

mutation TestWorkflowActive($input: TestWorkflowActiveInput!) {
  testWorkflowActive(input: $input) {
    error {
      __typename
      ... on WorkflowUserError {
        ...WorkflowUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    runState
  }
}

mutation ToggleWorkflow($id: ID!, $enabled: Boolean!) {
  toggleWorkflow(id: $id, enabled: $enabled) {
    error {
      __typename
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    workflow {
      ...WorkflowFull
    }
  }
}

mutation RunConvertWorkflow($id: ID!, $input: Blob!) {
  runConvertWorkflow(id: $id, input: $input) {
    error {
      __typename
      ... on WorkflowUserError {
        ...WorkflowUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    output
  }
}

mutation RunActiveWorkflow($id: ID!, $input: RunActiveWorkflowInput!) {
  runActiveWorkflow(id: $id, input: $input) {
    error {
      __typename
      ... on UnknownIdUserError {
        ...UnknownIdUserErrorFull
      }
      ... on PermissionDeniedUserError {
        ...PermissionDeniedUserErrorFull
      }
      ... on OtherUserError {
        ...OtherUserErrorFull
      }
    }
    task {
      ...WorkflowTaskMeta
    }
  }
}
